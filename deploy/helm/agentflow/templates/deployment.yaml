apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentflow.fullname" . }}-http
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentflow.name" . }}
      app.kubernetes.io/component: http
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentflow.name" . }}
        app.kubernetes.io/component: http
    spec:
      containers:
        - name: agent-http
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: AGENT_HTTP_ADDR
              value: "0.0.0.0:{{ .Values.service.port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentflow.fullname" . }}-http
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "agentflow.name" . }}
    app.kubernetes.io/component: http
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- if .Values.worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentflow.fullname" . }}-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentflow.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentflow.name" . }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: agent-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- end }}
