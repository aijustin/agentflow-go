apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentflow-worker
  namespace: agentflow
  labels:
    app.kubernetes.io/name: agentflow-go
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentflow-go
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentflow-go
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: your-org/agentflow-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agentflow-config
            - secretRef:
                name: agentflow-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi