apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentflow-http
  labels:
    app.kubernetes.io/name: agentflow-go
    app.kubernetes.io/component: http
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentflow-go
      app.kubernetes.io/component: http
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentflow-go
        app.kubernetes.io/component: http
    spec:
      containers:
        - name: agent-http
          image: agentflow-go
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agentflow-config
            - secretRef:
                name: agentflow-secrets
          ports:
            - name: http
              containerPort: 18080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi