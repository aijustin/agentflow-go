apiVersion: v1
kind: Service
metadata:
  name: agentflow-http
  labels:
    app.kubernetes.io/name: agentflow-go
    app.kubernetes.io/component: http
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentflow-go
    app.kubernetes.io/component: http
  ports:
    - name: http
      port: 80
      targetPort: http