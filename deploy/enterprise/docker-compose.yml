services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow-dev-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ../migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: quay.io/minio/minio:RELEASE.2026-04-15T19-29-53Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentflow-dev-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: quay.io/minio/mc:RELEASE.2026-04-15T17-39-10Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentflow-dev-password}
      AGENTFLOW_S3_BUCKET: ${AGENTFLOW_S3_BUCKET:-agentflow}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${AGENTFLOW_S3_BUCKET}"
        mc anonymous set none "local/$${AGENTFLOW_S3_BUCKET}"

  agent-http:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET: agent-http
    environment:
      AGENT_HTTP_ADDR: 0.0.0.0:18080
      AGENT_TOKEN_SECRET: ${AGENT_TOKEN_SECRET:-dev-token-secret-change-me}
      AGENT_HTTP_API_KEY: ${AGENT_HTTP_API_KEY:-dev-api-key-change-me}
      AGENT_HTTP_TENANT_ID: ${AGENT_HTTP_TENANT_ID:-default}
      AGENT_HTTP_PRINCIPAL_ID: ${AGENT_HTTP_PRINCIPAL_ID:-agent-http}
      AGENT_HTTP_AUDIT_FILE: /data/audit/audit.jsonl
    ports:
      - "${AGENT_HTTP_PORT:-18080}:18080"
    volumes:
      - agentflow-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  minio-data:
  agentflow-data: