scenario:
  name: context-governance-demo
  llms:
    default:
      provider: openai-compatible
      model: qwen/qwen3.6-35b-a3b
      endpoint: http://127.0.0.1:1234/v1
      api_key_env: AGENT_REALMODEL_API_KEY
      context_window_tokens: 1400
      max_output_tokens: 1024
      temperature: 0
      top_p: 0.8
      thinking:
        enabled: true
        budget_tokens: 768
      context:
        strategy: sliding_window_with_summary
        max_input_tokens: 220
        reserved_output_tokens: 1024
        summary_tokens: 80
        tool_result_max_tokens: 400
        memory_recall_limit: 8
        system_prompt_protection: true
        compression:
          enabled: true
          trigger_ratio: 0.5
  memories:
    session:
      type: in_memory
      scope: session
  agents:
    assistant:
      llm: default
      memory: session
      instructions: "You are a context-governance test assistant. Preserve system instructions and the latest user request."
  orchestration:
    mode: autonomous
    human_in_loop:
      enabled: false
