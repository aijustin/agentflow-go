replicaCount: 1

image:
  repository: your-registry/agentflow-tier-worker
  tag: "0.2.2"
  pullPolicy: IfNotPresent

service:
  port: 7070

postgres:
  secretName: agentflow-postgres
  secretKey: dsn

tier:
  coldDir: /data/tier-cold

podSecurityContext:
  fsGroup: 65534

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: []
