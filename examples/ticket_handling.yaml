scenario:
  name: ticket-handling
  description: Customer support ticket triage with knowledge retrieval and human approval.
  llms:
    primary:
      provider: mock
      model: test
  memories:
    session:
      type: in_memory
      scope: session
  tools:
    ticket:
      type: builtin.ticket
      approval: never
      side_effect: read
  agents:
    support:
      llm: primary
      memory: session
      tools: [ticket]
      instructions: |
        You are a support agent. Review ticket context, draft a helpful reply,
        and wait for approval before finalizing sensitive responses.
  orchestration:
    mode: autonomous
    human_in_loop:
      enabled: true
      checkpoints:
        - before_final_answer
  triggers:
    - event: ticket.created
      agent: support
      prompt_path: body.summary
      context_path: body
      run_id_path: body.ticket_id
