scenario:
  name: adaptive-rag
  description: Adaptive RAG workflow that routes factual questions to retrieval and direct questions to the agent.
  llms:
    chat:
      provider: mock
      model: test-chat
      capabilities: [chat, tool_call]
    embed:
      provider: mock
      model: test-embed
      capabilities: [embed]
  knowledge:
    collections:
      - name: docs
        namespace: docs
        tool: knowledge.retrieve
        embed_profile: embed
        search_mode: hybrid
        tenant_scoped: true
  tools:
    knowledge.retrieve:
      type: knowledge.retriever
      description: Retrieve relevant documents from the knowledge store.
      approval: never
      side_effect: read
      input_schema:
        type: object
        required: [query]
        properties:
          query:
            type: string
          namespace:
            type: string
          limit:
            type: integer
  agents:
    assistant:
      llm: chat
      tools: [knowledge.retrieve]
      instructions: "Answer directly when route is direct; otherwise use retrieved evidence."
  orchestration:
    mode: fixed_workflow
    workflow:
      nodes:
        - id: route
          kind: query_router
          input:
            query: "{{prompt}}"
        - id: retrieve
          kind: tool
          ref: knowledge.retrieve
          depends_on: [route]
          condition: 'eq(steps.route.output.route, "rag")'
          input:
            query: "{{prompt}}"
            namespace: docs
            limit: 5
        - id: answer
          kind: agent
          ref: assistant
          depends_on: [route, retrieve]
      edges:
        - from: route
          to: retrieve
        - from: retrieve
          to: answer
        - from: route
          to: answer
