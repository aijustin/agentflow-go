scenario:
  name: code-review-pipeline
  description: Fixed workflow for repository diff inspection, parallel review, and maintainer approval.
  llms:
    reviewer:
      provider: mock
      model: test
  tools:
    git:
      type: builtin.git
      approval: never
      side_effect: read
  agents:
    security:
      llm: reviewer
      instructions: Review changes for security risks.
    style:
      llm: reviewer
      instructions: Review changes for style and readability.
  orchestration:
    mode: fixed_workflow
    max_parallel: 2
    human_in_loop:
      enabled: true
    workflow:
      nodes:
        - id: diff
          kind: tool
          ref: git
          input:
            action: diff
            repo: .
        - id: reviews
          kind: parallel_group
          depends_on: [diff]
          input:
            refs: [security, style]
        - id: merge
          kind: transform
          depends_on: [reviews]
          input:
            copy:
              findings: steps.reviews.members
        - id: approve
          kind: human_gate
          depends_on: [merge]
      edges: []
