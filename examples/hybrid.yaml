scenario:
  name: hybrid-research-answer
  description: |
    Hybrid mode: a fixed workflow phase first searches a repository and
    collects relevant context, then an autonomous agent synthesises the
    findings into a final answer.  The agent can call additional tools if
    the initial search is insufficient.
  llms:
    primary:
      provider: mock
      model: test
  memories:
    session:
      type: in_memory
      scope: session
  tools:
    repo_search:
      type: builtin.repo_search
      approval: never
  agents:
    analyst:
      llm: primary
      memory: session
      tools: [repo_search]
      instructions: |
        You are a research analyst.  You have been provided with workflow step
        outputs as JSON context.  Synthesise the information into a clear and
        concise answer.  You may call repo_search again if additional detail is
        needed.
  orchestration:
    mode: hybrid
    workflow:
      nodes:
        - id: initial_search
          kind: tool
          ref: repo_search
      edges: []
    # After the workflow phase the analyst agent runs autonomously.
    # Its prompt is the original user prompt; its context is the
    # JSON-encoded step outputs from the workflow phase.
