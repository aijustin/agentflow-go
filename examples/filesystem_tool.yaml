scenario:
  name: filesystem-tool-example
  llms:
    default:
      provider: mock
      model: test
      capabilities: [chat, tool_call]
  tools:
    fs.read:
      type: builtin.filesystem
      description: Read a file under an allowlisted local root.
      approval: never
      side_effect: read
      rate_cap: 10
      input_schema:
        type: object
        required: [path]
        properties:
          path:
            type: string
  agents:
    assistant:
      llm: default
      tools: [fs.read]
      instructions: "Use fs.read only for allowlisted local runbooks or documentation."
  orchestration:
    mode: autonomous
    human_in_loop:
      enabled: false