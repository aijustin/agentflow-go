scenario:
  name: multi-expert-research
  description: Parallel expert analysis with plan tracking and lead-author synthesis.
  llms:
    primary:
      provider: mock
      model: test
  memories:
    session:
      type: in_memory
      scope: session
  agents:
    macro:
      llm: primary
      instructions: Provide macroeconomic analysis.
    industry:
      llm: primary
      instructions: Provide industry trend analysis.
    finance:
      llm: primary
      instructions: Provide financial metrics analysis.
    lead_author:
      llm: primary
      memory: session
      instructions: Synthesize expert outputs into an executive research brief.
  orchestration:
    mode: hybrid
    planning:
      enabled: true
      execute: true
      max_steps: 4
    workflow:
      nodes:
        - id: experts
          kind: parallel_group
          input:
            refs: [macro, industry, finance]
      edges: []
