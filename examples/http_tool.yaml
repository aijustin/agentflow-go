scenario:
  name: http-tool-example
  llms:
    default:
      provider: mock
      model: test
      capabilities: [chat, tool_call]
  tools:
    http.status:
      type: builtin.http
      description: Read an allowlisted internal HTTP endpoint.
      approval: never
      side_effect: read
      rate_cap: 5
      input_schema:
        type: object
        required: [url]
        properties:
          method:
            type: string
            enum: [GET, HEAD]
          url:
            type: string
          headers:
            type: object
            additionalProperties:
              type: string
  agents:
    assistant:
      llm: default
      tools: [http.status]
      instructions: "Use http.status only for allowlisted service status checks."
  orchestration:
    mode: autonomous
    human_in_loop:
      enabled: false